<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube clone</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <!-- Header -> logo + search + icons -->
    <header class="header">
        <div class="container">
            <div class="header-left">
                <img src="assets/menu.png" alt="menu" class="menu">
                <div class="logo">
                    <img src="assets/youtube-logo.png" alt="yt logo" width="50px" height="50px" class="menu">
                    <a href="https://www.youtube.com/" target="_top" class="logo">Youtube <sup>PK</sup></a>
                </div>
            </div>
            <div class="header-center">
                <div>
                    <form action="" class="search-form">
                        <label for="search">Search</label>
                        <input id="search" type="text" autocomplete="off" placeholder="Search Youtube"
                            class="search-input">
                        <button type="submit" class="search-btn">
                            <img src="assets/search.png" alt="search" class="menu">
                        </button>
                    </form>
                </div>
                <img src="assets/mic.png" alt="voice" class="menu">

            </div>
            <div class="header-right">
                <button class="create-btn">
                    <img src="assets/create.png" alt="create" class="menu">
                    Create
                </button>

                <button>
                    <img src="assets/notification.png" alt="notification" class="menu">
                    <span>9</span>
                </button>
                <button>
                    <img src="assets/profile.png" alt="profile" class="menu">
                </button>
            </div>
        </div>
    </header>

            <ul class="sidebar-list">
